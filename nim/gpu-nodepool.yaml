# GPU NodePool — G5 instances (A10G GPU), on-demand only.
#
# Node labels (spec.template.metadata.labels) are critical:
#   NIMCache and NIMService use nodeSelector to target these labels.
#   Without them, NIM pods can't find GPU nodes.
#
# Taint: nvidia.com/gpu=Exists:NoSchedule — keeps CPU-only pods off GPU nodes.
# NIMCache and NIMService carry a matching toleration.
#
# Cost note: G5 instances are billed per second. consolidateAfter: 30s
# terminates empty GPU nodes quickly after NIMService pods are removed.

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-node-pool
spec:
  template:
    metadata:
      labels:
        type: karpenter
        NodeGroupType: gpu-node-pool
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      taints:
        - key: nvidia.com/gpu
          value: "Exists"
          effect: "NoSchedule"
      requirements:
        - key: "eks.amazonaws.com/instance-family"
          operator: In
          values: ["g5"]
        - key: "eks.amazonaws.com/instance-size"
          operator: In
          values: ["xlarge", "2xlarge", "4xlarge", "8xlarge", "16xlarge", "12xlarge", "24xlarge"]
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
  limits:
    cpu: "1000"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
